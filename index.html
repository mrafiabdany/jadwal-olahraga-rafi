<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafi's Daily Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #d1d5db;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1);
            outline: none;
        }
        .category-pill {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center md:text-left flex flex-col md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-4xl font-bold text-gray-800">Halo, Rafi! 👋</h1>
                <p class="text-gray-500 mt-1">Siap untuk produktif hari ini?</p>
            </div>
            <div id="current-date" class="mt-4 md:mt-0 text-sm font-semibold text-indigo-500 bg-white px-4 py-2 rounded-full shadow-sm inline-block">
                </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-gray-700 mb-6 flex items-center">
                        <i data-lucide="plus-circle" class="mr-2 text-indigo-500"></i> Tambah Kegiatan
                    </h2>
                    
                    <form id="schedule-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Nama Kegiatan</label>
                            <input type="text" id="task-name" required placeholder="Lari pagi / Main Game..." class="w-full input-field rounded-xl px-4 py-3">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Kategori</label>
                            <select id="task-category" class="w-full input-field rounded-xl px-4 py-3 appearance-none">
                                <option value="Olahraga">🏋️‍♂️ Olahraga</option>
                                <option value="Hobi">🎨 Hobi</option>
                                <option value="Rutinitas">🔄 Rutinitas</option>
                                <option value="Spesial">✨ Momen Spesial</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Waktu</label>
                            <input type="time" id="task-time" required class="w-full input-field rounded-xl px-4 py-3">
                        </div>

                        <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-indigo-200 mt-4 flex items-center justify-center">
                            Simpan ke Jadwal
                        </button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Jadwal Kamu</h2>
                    <span id="task-count" class="bg-indigo-100 text-indigo-600 text-xs font-bold px-3 py-1 rounded-full">0 Kegiatan</span>
                </div>

                <div id="schedule-list" class="space-y-4">
                    <div class="text-center py-20 text-gray-400 italic" id="empty-state">
                        Belum ada jadwal. Mulai hari kamu dengan menambahkannya!
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Date Display
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', dateOptions);

        const form = document.getElementById('schedule-form');
        const list = document.getElementById('schedule-list');
        const emptyState = document.getElementById('empty-state');
        const taskCountLabel = document.getElementById('task-count');

        let schedules = JSON.parse(localStorage.getItem('rafi_schedules')) || [];

        function saveAndRender() {
            localStorage.setItem('rafi_schedules', JSON.stringify(schedules));
            renderSchedules();
        }

        function renderSchedules() {
            list.innerHTML = '';
            
            if (schedules.length === 0) {
                list.appendChild(emptyState);
                taskCountLabel.innerText = "0 Kegiatan";
                return;
            }

            // Sort by time
            schedules.sort((a, b) => a.time.localeCompare(b.time));
            
            taskCountLabel.innerText = `${schedules.length} Kegiatan`;

            schedules.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-5 shadow-md flex items-center justify-between border-l-8 ' + getBorderColor(item.category);
                
                card.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="p-3 rounded-full ${getIconBg(item.category)} text-white">
                            ${getIcon(item.category)}
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${item.name}</h3>
                            <div class="flex items-center space-x-2 mt-1">
                                <span class="category-pill ${getBadgeColor(item.category)}">${item.category}</span>
                                <span class="text-sm text-gray-500 flex items-center">
                                    <i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${item.time}
                                </span>
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-gray-400 hover:text-red-500 transition p-2">
                        <i data-lucide="trash-2"></i>
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newSchedule = {
                name: document.getElementById('task-name').value,
                category: document.getElementById('task-category').value,
                time: document.getElementById('task-time').value
            };
            schedules.push(newSchedule);
            form.reset();
            saveAndRender();
        });

        window.deleteTask = (index) => {
            schedules.splice(index, 1);
            saveAndRender();
        };

        // Helper functions for styling
        function getBorderColor(cat) {
            if (cat === 'Olahraga') return 'border-orange-300';
            if (cat === 'Hobi') return 'border-pink-300';
            if (cat === 'Rutinitas') return 'border-blue-300';
            return 'border-purple-400';
        }

        function getIconBg(cat) {
            if (cat === 'Olahraga') return 'bg-orange-400';
            if (cat === 'Hobi') return 'bg-pink-400';
            if (cat === 'Rutinitas') return 'bg-blue-400';
            return 'bg-purple-500';
        }

        function getBadgeColor(cat) {
            if (cat === 'Olahraga') return 'bg-orange-100 text-orange-600';
            if (cat === 'Hobi') return 'bg-pink-100 text-pink-600';
            if (cat === 'Rutinitas') return 'bg-blue-100 text-blue-600';
            return 'bg-purple-100 text-purple-600';
        }

        function getIcon(cat) {
            if (cat === 'Olahraga') return '<i data-lucide="dumbbell"></i>';
            if (cat === 'Hobi') return '<i data-lucide="palette"></i>';
            if (cat === 'Rutinitas') return '<i data-lucide="refresh-cw"></i>';
            return '<i data-lucide="sparkles"></i>';
        }

        renderSchedules();
    </script>
</body>
</html>
